services:
  # --- Backend infrastructure ---
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rbscope
      MYSQL_DATABASE: rbscope_dev
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - rbscope-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prbscope"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - rbscope-net
    depends_on:
      - pyroscope
      - jaeger

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "4040:4040"
    networks:
      - rbscope-net

  jaeger:
    image: jaegertracing/jaeger:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
    networks:
      - rbscope-net

  # --- Application under test ---
  test-app:
    build:
      context: .
      dockerfile: test-rails-app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development
      - DATABASE_HOST=mysql
      - DATABASE_USER=root
      - DATABASE_PASSWORD=rbscope
      - RBSCOPE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=rbscope-test-app
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
    networks:
      - rbscope-net
    depends_on:
      mysql:
        condition: service_healthy
      otel-collector:
        condition: service_started
      pyroscope:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # --- Collector in demo mode (simulated stacks, no BPF needed) ---
  collector-demo:
    build:
      context: .
      dockerfile: collector/Dockerfile
    command: ["demo", "--pyroscope-url=http://pyroscope:4040", "--frequency=99"]
    ports:
      - "8080:8080"
    networks:
      - rbscope-net
    depends_on:
      - pyroscope

  # --- Real collector (BPF, attaches to test-app Ruby process) ---
  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    command:
      - "run"
      - "--pid=0"
      - "--frequency=99"
      - "--export=pyroscope"
      - "--pyroscope-url=http://pyroscope:4040"
      - "--health-port=8081"
    privileged: true
    pid: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "8081:8081"
    networks:
      - rbscope-net
    depends_on:
      test-app:
        condition: service_healthy
      pyroscope:
        condition: service_started

volumes:
  mysql-data:

networks:
  rbscope-net:
    driver: bridge
