services:
  # --- Backend infrastructure ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - rbscope-net
    depends_on:
      - pyroscope
      - jaeger

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "4040:4040"
    networks:
      - rbscope-net

  jaeger:
    image: jaegertracing/jaeger:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
    networks:
      - rbscope-net

  # --- Application under test ---
  test-app:
    build:
      context: .
      dockerfile: test-rails-app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=rbscope-test-app
    networks:
      - rbscope-net
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "ruby", "-e", "require 'net/http'; Net::HTTP.get(URI('http://localhost:3000/health'))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # --- Collector in demo mode (no BPF needed) ---
  collector-demo:
    build:
      context: .
      dockerfile: collector/Dockerfile
    command: ["demo", "--pyroscope-url=http://pyroscope:4040", "--frequency=99"]
    ports:
      - "8080:8080"
    networks:
      - rbscope-net
    depends_on:
      - pyroscope

networks:
  rbscope-net:
    driver: bridge
