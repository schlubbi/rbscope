name: eBPF End-to-End

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ebpf-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Kernel info
        run: |
          echo "Runner: ${{ matrix.os }}"
          uname -r
          cat /etc/os-release | head -5
          # Verify BTF support (required for CO-RE)
          ls -la /sys/kernel/btf/vmlinux

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libbpf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common linux-tools-$(uname -r) || true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          cargo-cache: true

      # ── Build the gem ──────────────────────────────────────────────
      - name: Build rbscope gem
        working-directory: gem
        run: |
          bundle install
          bundle exec rake compile

      # ── Generate BPF bytecode from C sources ───────────────────────
      - name: Generate BPF objects (bpf2go)
        working-directory: collector
        run: |
          go generate ./pkg/bpf/
          ls -la pkg/bpf/*.o 2>/dev/null || ls -la pkg/bpf/*_bpf*.go 2>/dev/null
          echo "BPF generation succeeded"

      # ── Build the collector ────────────────────────────────────────
      - name: Build collector
        working-directory: collector
        run: go build -v -o rbscope-collector ./cmd/rbscope-collector/

      # ── Run collector unit tests with real BPF ─────────────────────
      - name: Unit tests (with BPF)
        working-directory: collector
        run: sudo go test -v -count=1 -race ./...

      # ── E2E: Start a Ruby process, attach collector, verify ────────
      - name: E2E — start Ruby workload
        run: |
          cat > /tmp/workload.rb << 'RUBY'
          $LOAD_PATH.unshift File.join(__dir__, '..', 'gem', 'lib')
          $LOAD_PATH.unshift File.join(__dir__, '..', 'gem', 'ext')
          require 'rbscope'

          Rbscope.start(frequency: 99)
          puts "rbscope started, PID=#{$$}"

          # Simulate CPU work
          loop do
            result = 0
            100_000.times { |i| result += i }
            File.read('/dev/null')
            sleep 0.01
          end
          RUBY

          cd $GITHUB_WORKSPACE
          ruby /tmp/workload.rb &
          RUBY_PID=$!
          echo "RUBY_PID=$RUBY_PID" >> "$GITHUB_ENV"
          sleep 2
          # Verify it's running
          kill -0 $RUBY_PID

      - name: E2E — collector capture
        working-directory: collector
        run: |
          echo "Attaching to Ruby PID=$RUBY_PID"
          sudo timeout 10 ./rbscope-collector capture \
            --pid=$RUBY_PID \
            --duration=5s \
            --output=/tmp/capture.pb \
            || true  # timeout returns 124, that's fine
          ls -la /tmp/capture.pb
          echo "Capture file size: $(stat -c%s /tmp/capture.pb) bytes"
          test -s /tmp/capture.pb || { echo "FAIL: capture file is empty"; exit 1; }
          echo "✅ Capture succeeded"

      - name: E2E — collector live run with Pyroscope push
        working-directory: collector
        run: |
          # Start a mock HTTP server to receive pprof pushes
          python3 -c '
          import http.server, json, sys, threading
          class H(http.server.BaseHTTPRequestHandler):
              received = 0
              def do_POST(self):
                  length = int(self.headers.get("Content-Length", 0))
                  H.received += length
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b"ok")
                  print(f"Received push: {length} bytes (total: {H.received})", flush=True)
              def log_message(self, *a): pass
          s = http.server.HTTPServer(("127.0.0.1", 4040), H)
          threading.Thread(target=s.serve_forever, daemon=True).start()
          import time; time.sleep(999)
          ' &
          MOCK_PID=$!
          sleep 1

          # Run collector for 8 seconds pushing to mock Pyroscope
          sudo timeout 12 ./rbscope-collector run \
            --pid=$RUBY_PID \
            --export=pyroscope \
            --pyroscope-url=http://127.0.0.1:4040 \
            --frequency=99 \
            2>&1 | head -50 &
          COLLECTOR_PID=$!

          sleep 10

          # Check that mock server received data
          if curl -sf http://127.0.0.1:4040 > /dev/null 2>&1; then
            echo "✅ Mock Pyroscope server was accepting pushes"
          fi

          # Cleanup
          sudo kill $COLLECTOR_PID 2>/dev/null || true
          kill $MOCK_PID 2>/dev/null || true
          wait 2>/dev/null || true

      - name: E2E — verify USDT probe symbols
        run: |
          # Check that the gem exposes the USDT probe symbols the collector attaches to
          GEM_SO=$(find gem/ -name "rbscope.so" -o -name "rbscope.bundle" 2>/dev/null | head -1)
          if [ -n "$GEM_SO" ]; then
            echo "Gem shared object: $GEM_SO"
            nm -D "$GEM_SO" 2>/dev/null | grep __rbscope_probe || \
            nm "$GEM_SO" 2>/dev/null | grep __rbscope_probe || \
            echo "WARN: probe symbols not found (may be normal for some build configs)"
          fi

      - name: E2E — verify BPF program attachment
        working-directory: collector
        run: |
          # Quick check: can we load and attach BPF programs?
          sudo timeout 5 ./rbscope-collector run \
            --pid=$RUBY_PID \
            --export=file \
            --frequency=99 \
            2>&1 | head -20 || true
          echo "✅ BPF loader executed without crash"

      - name: Cleanup
        if: always()
        run: |
          kill $RUBY_PID 2>/dev/null || true
          # Show kernel BPF stats if available
          sudo bpftool prog list 2>/dev/null | tail -10 || true

  # --- BPF compatibility across kernel versions (no Ruby needed) ---
  bpf-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel: [stable, "6.8", "6.1"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install vimto + QEMU
        run: |
          go install lmb.io/vimto@latest
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86
          sudo chmod 0666 /dev/kvm

      - name: Install BPF build deps
        run: |
          sudo apt-get install -y -qq clang llvm libbpf-dev

      - name: Generate BPF objects
        working-directory: collector
        run: go generate ./pkg/bpf/

      - name: BPF load tests on kernel ${{ matrix.kernel }}
        working-directory: collector
        run: |
          echo "Testing BPF programs on kernel: ${{ matrix.kernel }}"
          vimto -kernel ghcr.io/cilium/ci-kernels:${{ matrix.kernel }} -- \
            go test -v -count=1 ./test/bpf/...
