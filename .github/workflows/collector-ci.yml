name: Collector CI

on:
  push:
    paths: ['collector/**', 'proto/**', '.github/workflows/collector-ci.yml']
  pull_request:
    paths: ['collector/**', 'proto/**', '.github/workflows/collector-ci.yml']

defaults:
  run:
    working-directory: collector

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Unit tests
        run: go test ./pkg/... ./cmd/... ./internal/... -v -count=1
      - name: Race detector
        run: go test -race ./pkg/... -count=1
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory until existing issues are fixed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: collector
          args: --timeout=5m
