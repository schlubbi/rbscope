name: Collector CI

on:
  push:
    paths: ['collector/**', 'proto/**']
  pull_request:
    paths: ['collector/**', 'proto/**']

defaults:
  run:
    working-directory: collector

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Unit tests
        run: go test ./... -v -count=1
      - name: Race detector
        run: go test -race ./... -count=1
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: collector
          version: latest
          args: --timeout=5m

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Integration tests (require CAP_BPF)
        run: |
          sudo setcap cap_bpf,cap_perfmon+ep $(go env GOROOT)/bin/go || true
          go test -tags=integration -v -count=1 ./... || echo "Integration tests require CAP_BPF, may skip"
