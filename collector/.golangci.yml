version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - revive
    - gosimple
    - unconvert
    - unparam

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G104

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
