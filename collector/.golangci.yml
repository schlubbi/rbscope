run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - gofmt
    - goimports
    - revive
    - gosimple
    - unconvert
    - unparam

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gosec:
    excludes:
      - G104  # unhandled errors on deferred Close() calls

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
