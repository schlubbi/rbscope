default: &default
  adapter: trilogy
  encoding: utf8mb4
  pool: 5
  host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DATABASE_PORT", 3306) %>
  username: <%= ENV.fetch("DATABASE_USER", "root") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "rbscope") %>

development:
  <<: *default
  database: rbscope_dev

test:
  <<: *default
  database: rbscope_test
